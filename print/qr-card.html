<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Marriage Procession — Gallery Card · Pacific Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --ink:   #0F0E0D;
      --cream: #FAF7F2;
      --warm:  #F5F0E8;
      --gold:  #B8902A;
      --terra: #C4622D;
      --serif: 'Cormorant Garamond', serif;
      --sans:  'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 210mm;
      height: 148mm;
      background: var(--cream);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── CARD SHELL ─────────────────────────────────────────── */
    .card {
      width: 210mm;
      height: 148mm;
      display: flex;
      flex-direction: column;
      background: var(--cream);
      overflow: hidden;
      position: relative;
    }

    /* Thin outer border */
    .card::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(184,144,42,0.2);
      pointer-events: none;
      z-index: 10;
    }

    /* ── TOP — landscape painting ───────────────────────────── */
    .card-painting {
      width: 100%;
      flex: 0 0 55%;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .card-painting img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: #ffffff;
    }

    /* ── TITLE STRIP — below painting ───────────────────────── */
    .card-title-strip {
      padding: 7px 18px 4px;
      border-top: 1px solid rgba(184,144,42,0.18);
      background: var(--cream);
    }

    .card-painting-name {
      font-family: var(--serif);
      font-size: 16px;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.03em;
      line-height: 1.2;
    }

    .card-painting-name em {
      font-style: italic;
      color: var(--terra);
    }

    .card-painting-sub {
      font-size: 7px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(15,14,13,0.38);
      margin-top: 2px;
      font-weight: 300;
    }

    /* ── BOTTOM ROW ─────────────────────────────────────────── */
    .card-bottom {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 4px 18px 12px;
      gap: 16px;
    }

    /* ── LEFT — brand + stats ───────────────────────────────── */
    .card-bottom-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card-brand {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-brand-name {
      font-size: 7.5px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 300;
      color: var(--terra);
    }

    /* Thin gold rule */
    .card-brand-rule {
      height: 1px;
      background: linear-gradient(to right, rgba(184,144,42,0.35), transparent);
      width: 100%;
    }

    .card-stats {
      display: flex;
      flex-direction: row;
      gap: 18px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .stat-num {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 6.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-weight: 300;
      color: rgba(15,14,13,0.45);
    }

    .card-footer-text {
      font-size: 6.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(15,14,13,0.25);
      font-weight: 300;
    }

    /* ── RIGHT — QR ─────────────────────────────────────────── */
    .card-qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .qr-box {
      width: 72px;
      height: 72px;
      padding: 4px;
      background: white;
      border: 1px solid rgba(184,144,42,0.3);
      box-shadow:
        0 0 0 3px var(--cream),
        0 0 0 4px rgba(184,144,42,0.12);
    }

    #qrcode canvas,
    #qrcode img {
      width: 64px !important;
      height: 64px !important;
    }

    .qr-label {
      font-size: 6px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(15,14,13,0.32);
      text-align: center;
    }

    /* ── PRINT ──────────────────────────────────────────────── */
    @page {
      size: 210mm 148mm landscape;
      margin: 0;
    }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      html, body { width: 210mm; height: 148mm; overflow: hidden; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- TOP — full-width landscape painting -->
  <div class="card-painting">
    <img src="../v3/images/hero.jpg" alt="The Marriage Procession — Rajasthani miniature by Jitendra Yadav">
  </div>

  <!-- TITLE STRIP — below painting, above stats row -->
  <div class="card-title-strip">
    <p class="card-painting-name">The <em>Marriage</em> Procession</p>
    <p class="card-painting-sub">Rajasthani Miniature · Natural Pigments · Silk</p>
  </div>

  <!-- BOTTOM ROW — brand/stats + QR -->
  <div class="card-bottom">

    <div class="card-bottom-left">

      <div class="card-brand">
        <svg width="11" height="11" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="7.5" stroke="#C4622D" stroke-width="1.4"/>
          <circle cx="9" cy="9" r="2.4" fill="#C4622D"/>
        </svg>
        <span class="card-brand-name">Pacific Art · Udaipur</span>
      </div>

      <div class="card-brand-rule"></div>

      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-num">28</span>
          <span class="stat-label">Days of work</span>
        </div>
        <div class="stat-item">
          <span class="stat-num">5</span>
          <span class="stat-label">Generations</span>
        </div>
        <div class="stat-item">
          <span class="stat-num">1</span>
          <span class="stat-label">Artist</span>
        </div>
      </div>

      <span class="card-footer-text">PAC — 2026 — 003 &nbsp;·&nbsp; Hathi Pol Bazaar, Udaipur</span>

    </div>

    <div class="card-qr-wrap">
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
      <span class="qr-label">Scan for the full story</span>
    </div>

  </div>

</div>

<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'https://devashishjose.github.io/origintag/v3/',
    width: 64,
    height: 64,
    colorDark: '#0F0E0D',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>

</body>
</html>
